<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ナレッジ検索</title>
</head>

<body>

<form method="POST" action="/ask" enctype="multipart/form-data">
  
  <p>質問：</p>
  <input type="text" name="question" style="width:400px;" required>

  <p>レシート画像（任意）：</p>
  <input type="file" name="image">

  <br><br>
  <button type="submit">検索</button>
</form>

<hr>

{% if answer %}
  <h3>回答</h3>
  <p>{{ answer }}</p>
{% endif %}

</body>
</html>
